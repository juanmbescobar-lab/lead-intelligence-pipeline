---

services:
  n8n:
    # --- Identity (never changes) ---
    image: n8nio/n8n
    container_name: n8n

    # --- Network (rarely changes) ---
    ports:
      - "5678:5678"

    # --- Storage (rarely changes) ---
    volumes:
      - ./n8n-data:/home/node/.n8n

    # --- Resources (changes occasionally) ---
    mem_limit: 512m
    memswap_limit: 512m

    # --- Behavior (changes occasionally) ---
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # --- Environment (changes frequently) ---
    environment:
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=America/Bogota
      - TZ=America/Bogota
